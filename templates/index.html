<!DOCTYPE html>
<html>
<head>
    <title>Grade Assure</title>
    <style>

    /* -------------------- BODY -------------------- */
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f2f2f2;
    overflow: hidden;
}


/* -------------------- BACKGROUND CONTAINER -------------------- */
.bg-container {
    position: relative;
    width: 100%;
    height: 100%;
    background: url("/static/images/index.png") no-repeat center center;
    background-size: contain;
}


/* -------------------- COMMON BUTTON STYLE -------------------- */
.click-btn {
    position: absolute;
    border: none;
    background: transparent;
    cursor: pointer;
    z-index: 10;
}


/* -------------------- STUDENT BUTTON -------------------- */
.student-btn {
    top: 68%;
    left: 9%;
    width: 40%;
    height: 25%;
}


/* -------------------- FACULTY BUTTON -------------------- */
.faculty-btn {
    top: 68%;
    left: 52%;
    width: 40%;
    height: 25%;
}
</style>

<body>

    <div class="bg-container">

        <button class="click-btn student-btn"
            onclick="window.location.href='/student'">
        </button>

        <button class="click-btn faculty-btn"
            onclick="window.location.href='/faculty'">
        </button>

    </div>

</body>
</html>
