<!DOCTYPE html>
<html>

<head>
    <title>Grade Assure</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f2f2;
            overflow: hidden;
        }

        .bg-container {
            position: relative;
            width: 90%;
            height: 90%;
            background: url("/static/images/index.png") no-repeat center center;
            background-size: 90% 90%;
            background-position: center;
        }

        .click-btn {
            position: absolute;
            border: none;
            background: #28a745;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .click-btn:hover {

            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        /* Student click area */
        .student-btn {
            background-color: green;
            color: #f2f2f2;
            top: 83%;
            left: 17%;
            width: 23%;
            height: 7%;
            border-radius: 10px;
        }

        /* Faculty click area */
        .faculty-btn {
            background-color: blue;
            color: #f2f2f2;
            top: 83%;
            left: 57%;
            width: 23%;
            height: 7%;
            border-radius: 10px;
        }

        /* Mobile Responsive Adjustments */
        @media (max-width: 768px) {
            .bg-container {
                width: 100%;
                height: 100%;
                background-size: contain;
            }

            .student-btn {
                width: 35%;
                left: 10%;
                font-size: 11px;
            }

            .faculty-btn {
                width: 35%;
                left: 55%;
                font-size: 11px;
            }
        }
    </style>
</head>

<body>

    <div class="bg-container">

        <button class="click-btn student-btn" onclick="window.location.href='/student'">
            Check Grade Sheet Status
        </button>

        <button class="click-btn faculty-btn" onclick="window.location.href='/faculty'">
            Upload / Update Gradesheet
        </button>

    </div>

</body>

</html>
