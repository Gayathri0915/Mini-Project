<!DOCTYPE html>
<html>
<head>
    <title>Grade Assure</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f2f2f2;
}

/* Container */
.bg-container {
    position: relative;
    width: 100%;
    max-width: 1200px;
}

/* Image responsive */
.bg-container img {
    width: 100%;
    height: auto;
    display: block;
}

/* Buttons */
.click-btn {
    position: absolute;
    border: none;
    background: rgba(255,0,0,0.2); /* temporary for testing */
    cursor: pointer;
}

/* Desktop positions */
.student-btn {
    top: 68%;
    left: 9%;
    width: 40%;
    height: 20%;
}

.faculty-btn {
    top: 68%;
    left: 52%;
    width: 40%;
    height: 20%;
}

/* 📱 Mobile Fix */
@media (max-width: 768px) {
    .student-btn,
    .faculty-btn {
        position: static;
        width: 90%;
        height: 50px;
        margin: 10px auto;
        display: block;
        background: #007bff;
        color: white;
        border-radius: 8px;
    }

    .bg-container {
        display: flex;
        flex-direction: column;
        align-items: center;
    }
}
    </style>
</head>

<body>

    <div class="bg-container">

        <button class="click-btn student-btn"
            onclick="window.location.href='/student'">
        </button>

        <button class="click-btn faculty-btn"
            onclick="window.location.href='/faculty'">
        </button>

    </div>

</body>
</html>
