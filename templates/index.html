<!DOCTYPE html>
<html>

<head>
    <title>Grade Assure</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f2f2;
            overflow: hidden;
        }

        .bg-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: url("/static/images/index.png") no-repeat center center;
            background-size: 100% 100%;
        }

        .click-btn {
            position: absolute;
            border: none;
            cursor: pointer;
            z-index: 10;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 14px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .click-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        /* Student click area */
        .student-btn {
            top: 88.5%;
            left: 15.2%;
            width: 22.5%;
            height: 5.5%;
            background-color: #4CAF50;
            /* Green color to match image */
        }

        /* Faculty click area */
        .faculty-btn {
            top: 88.5%;
            left: 59%;
            width: 23.3%;
            height: 5.5%;
            background-color: #3b82f6;
            /* Blue color to match image */
        }
    </style>
</head>

<body>

    <div class="bg-container">

        <button class="click-btn student-btn" onclick="window.location.href='/student'">
            Check Grade Sheet Status
        </button>

        <button class="click-btn faculty-btn" onclick="window.location.href='/faculty'">
            Upload / Update Marksheet
        </button>

    </div>

</body>

</html>
