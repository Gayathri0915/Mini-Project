<!DOCTYPE html>
<html>
<head>
    <title>Student - Check Grade Sheet</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body{
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #dbeafe, #dcfce7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box{
            width: 420px;
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2{
            margin-top: 0;
            color: #1e3a8a;
            font-size: 24px;
        }

        p{
            color: gray;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 25px;
        }

        input{
            width: 90%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
            margin-bottom: 18px;
        }

        input:focus{
            border: 1px solid #2563eb;
            box-shadow: 0px 0px 6px rgba(37, 99, 235, 0.3);
        }

        button{
            width: 45%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin: 5px;
        }

        .check-btn{
            background-color: #2563eb;
            color: white;
        }

        .check-btn:hover{
            background-color: #1d4ed8;
        }

        .logout-btn{
            background-color: #dc2626;
            color: white;
        }

        .logout-btn:hover{
            background-color: #b91c1c;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Student Portal</h2>
    <p>Enter your Register Number to check grade sheet status</p>

    <form method="post" action="/student_result">

        <input type="text" name="reg_no" maxlength="9" placeholder="Enter Register Number" required>

        <button type="submit" class="check-btn">Submit</button>

        <button type="button" class="logout-btn" onclick="location.href='/'">
            Logout
        </button>

    </form>
</div>

</body>
</html>
