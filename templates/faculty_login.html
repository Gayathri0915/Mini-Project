<!DOCTYPE html>
<html>
<head>
    <title>Faculty Login</title>
    <style>
        body{
            font-family: Arial;
            background: linear-gradient(to right, #d9e4f5, #f2f2f2);
            margin: 0;
            padding: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box{
            width: 380px;
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2{
            margin-bottom: 25px;
            font-size: 24px;
        }

        input{
            width: 100%;
            padding: 12px;
            margin: 12px 0px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-size: 16px;
        }

        button:hover{
            background-color: #45a049;
        }

        .error{
            color: red;
            margin-top: 15px;
            font-size: 14px;
        }

        .success{
            color: green;
            margin-top: 15px;
            font-size: 14px;
        }

        /* Password eye icon style */
        .password-box{
            position: relative;
            width: 100%;
        }

        .password-box input{
            padding-right: 40px;
        }

        .eye{
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: gray;
        }

        /* Hide browser's default eye icon (Edge/IE) */
        input::-ms-reveal,
        input::-ms-clear {
            display: none;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Faculty Login</h2>

    <!-- ✅ IMPORTANT CHANGE HERE -->
    <form method="post" action="/faculty_login">

        <input type="text" name="fid" placeholder="Faculty ID" required>

        <div class="password-box">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <span class="eye" id="toggleIcon" onclick="togglePassword()">👁</span>
        </div>

        <button type="submit">Login</button>
    </form>

    {% if message %}
        <div class="{{ msg_type }}">{{ message }}</div>
    {% endif %}

</div>

<script>
    function togglePassword(){
        var pass = document.getElementById("password");
        var icon = document.getElementById("toggleIcon");
        if(pass.type === "password"){
            pass.type = "text";
            icon.innerText = "🔒"; // Change to lock or eye-slash if preferred
        }else{
            pass.type = "password";
            icon.innerText = "👁";
        }
    }
</script>

</body>
</html>
